services:
  - type: web
    name: expense-tracker-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: TELEGRAM_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: MONTHLY_BUDGET
        sync: false
      - key: PORT
        value: 10000
