<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Terminal</title>
<style>
/* ─── DESIGN TOKENS ─────────────────────────────────────────── */
:root {
  --bg:        #0d0f14;
  --surface:   #13161e;
  --border:    #1e2330;
  --border2:   #252b3b;
  --text:      #c9d1e8;
  --muted:     #5a6482;
  --dim:       #3a4060;
  --accent:    #4af0a0;       /* terminal green */
  --warn:      #f0b44a;       /* amber */
  --danger:    #f05a6a;       /* red */
  --income:    #4abaff;       /* blue */
  --font-mono: 'Courier New', Courier, monospace;
  --font-ui:   system-ui, -apple-system, sans-serif;
  --radius:    4px;
  --cell:      1px solid var(--border);
}

/* ─── BASE ──────────────────────────────────────────────────── */
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  min-height: 100vh;
  padding: 0 0 60px;
}
a { color: var(--accent); text-decoration: none; }

/* ─── HEADER ────────────────────────────────────────────────── */
.header {
  background: var(--surface);
  border-bottom: var(--cell);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.header-title {
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.header-title h1 {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 0.05em;
  font-family: var(--font-mono);
}
.header-title span {
  font-size: 0.75rem;
  color: var(--muted);
  letter-spacing: 0.04em;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
.month-select {
  background: var(--bg);
  color: var(--text);
  border: var(--cell);
  border-radius: var(--radius);
  padding: 5px 10px;
  font-family: var(--font-mono);
  font-size: 0.82rem;
  cursor: pointer;
  outline: none;
}
.month-select:focus { border-color: var(--accent); }
.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 6px var(--accent);
  animation: pulse 2.4s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; }
  50% { opacity: 0.35; }
}

/* ─── LAYOUT GRID ───────────────────────────────────────────── */
.grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 1px;
  background: var(--border);
  border-top: var(--cell);
}
.grid > * { background: var(--bg); }

.c12 { grid-column: span 12; }
.c8  { grid-column: span 8; }
.c4  { grid-column: span 4; }
.c6  { grid-column: span 6; }
.c3  { grid-column: span 3; }

@media (max-width: 900px) {
  .c8,.c4,.c6 { grid-column: span 12; }
}
@media (max-width: 600px) {
  .c3 { grid-column: span 6; }
}

/* ─── PANEL ─────────────────────────────────────────────────── */
.panel {
  padding: 18px 20px;
}
.panel-label {
  font-size: 0.68rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.panel-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ─── KPI TILES ─────────────────────────────────────────────── */
.kpi { padding: 18px 20px; border-right: var(--cell); }
.kpi:last-child { border-right: none; }
.kpi-label { font-size: 0.68rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
.kpi-value { font-size: 1.55rem; font-weight: 700; font-family: var(--font-mono); line-height: 1; }
.kpi-sub { font-size: 0.72rem; color: var(--muted); margin-top: 5px; }
.green { color: var(--accent); }
.amber { color: var(--warn); }
.red   { color: var(--danger); }
.blue  { color: var(--income); }

/* ─── BURN BAR ──────────────────────────────────────────────── */
.burn-wrap { margin: 12px 0 6px; }
.burn-bg {
  height: 6px;
  background: var(--border2);
  border-radius: 3px;
  overflow: hidden;
}
.burn-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease;
}
.burn-labels {
  display: flex;
  justify-content: space-between;
  font-size: 0.68rem;
  color: var(--muted);
  margin-top: 5px;
}

/* ─── SVG CHARTS ─────────────────────────────────────────────── */
svg.chart {
  width: 100%;
  overflow: visible;
}
.axis-label { font-family: var(--font-mono); font-size: 9px; fill: var(--muted); }
.axis-line  { stroke: var(--border2); stroke-width: 1; }
.grid-line  { stroke: var(--border); stroke-width: 1; stroke-dasharray: 3 4; }
.chart-line { fill: none; stroke: var(--accent); stroke-width: 2; stroke-linejoin: round; stroke-linecap: round; }
.chart-line-muted { fill: none; stroke: var(--muted); stroke-width: 1.5; stroke-dasharray: 5 4; }
.chart-area { opacity: 0.12; }
.chart-dot  { fill: var(--accent); }

/* ─── DONUT ──────────────────────────────────────────────────── */
.donut-wrap {
  display: flex;
  gap: 20px;
  align-items: center;
  flex-wrap: wrap;
}
.donut-legend { flex: 1; min-width: 140px; }
.legend-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.78rem;
}
.legend-row:last-child { border-bottom: none; }
.legend-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.legend-name { flex: 1; color: var(--text); }
.legend-pct  { color: var(--muted); font-size: 0.7rem; }
.legend-amt  { color: var(--accent); text-align: right; min-width: 70px; }

/* ─── CATEGORY BUDGET BARS ──────────────────────────────────── */
.cat-row {
  display: grid;
  grid-template-columns: 90px 1fr 70px;
  align-items: center;
  gap: 10px;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.75rem;
}
.cat-row:last-child { border-bottom: none; }
.cat-name { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cat-bar-bg {
  height: 4px;
  background: var(--border2);
  border-radius: 2px;
  overflow: hidden;
}
.cat-bar-fill { height: 100%; border-radius: 2px; }
.cat-amt { text-align: right; font-size: 0.7rem; }

/* ─── RECENT TABLE ───────────────────────────────────────────── */
.txn-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
.txn-table th {
  text-align: left;
  font-size: 0.66rem;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 4px 6px 8px;
  border-bottom: 1px solid var(--border2);
  font-weight: 400;
}
.txn-table td {
  padding: 7px 6px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.txn-table tr:last-child td { border-bottom: none; }
.txn-table tr:hover td { background: var(--surface); }
.cat-chip {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 2px;
  font-size: 0.67rem;
  background: var(--border2);
  color: var(--muted);
  letter-spacing: 0.04em;
}
.txn-type-income { color: var(--income); }

/* ─── INSIGHTS ───────────────────────────────────────────────── */
.insight-list { list-style: none; }
.insight-list li {
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
  font-size: 0.8rem;
  line-height: 1.55;
  display: flex;
  gap: 10px;
  align-items: flex-start;
}
.insight-list li:last-child { border-bottom: none; }
.insight-icon { color: var(--accent); font-size: 0.85rem; flex-shrink: 0; margin-top: 1px; }
.insight-text { color: var(--text); }
.insight-text strong { color: var(--warn); }
.insight-text em    { color: var(--accent); font-style: normal; }

/* ─── EMPTY STATE ────────────────────────────────────────────── */
.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
  font-size: 0.8rem;
  line-height: 2;
}
.empty-code {
  color: var(--accent);
  font-family: var(--font-mono);
}

/* ─── SCROLLBAR ──────────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>

const SAMPLE_CONFIG = {
  currency: '₹',
  monthlyBudget: 40000,
  budgets: {
    travel:5000, food:6000, groceries:5000, clothes:2500,
    rent:15000, bills:4000, luxuries:2000, investments:8000,
    health:2000, education:2000, other:1500
  },
  categories: ['travel','food','groceries','clothes','rent','bills','luxuries','investments','health','education','other']
};

/* ─── live data, fetched from /api/data; sample data is the placeholder
   shown only until the first successful fetch ─── */
let DATA = SAMPLE_DATA;
let CONFIG = SAMPLE_CONFIG;
let IS_SAMPLE = true;
let CUR = CONFIG.currency || '₹';

/* ═══════════════════════════════════════════════════════════════
   UTILITIES
   ═══════════════════════════════════════════════════════════════ */
function fmtMoney(n) {
  n = Math.round(n);
  const neg = n < 0;
  let s = String(Math.abs(n));
  if (s.length <= 3) return (neg ? '-' : '') + CUR + s;
  const last3 = s.slice(-3);
  let rest = s.slice(0, -3);
  const parts = [];
  while (rest.length > 2) { parts.unshift(rest.slice(-2)); rest = rest.slice(0,-2); }
  if (rest) parts.unshift(rest);
  return (neg ? '-' : '') + CUR + parts.join(',') + ',' + last3;
}

function fmtMonthLabel(ym) {
  const [y, m] = ym.split('-').map(Number);
  return new Date(y, m-1, 1).toLocaleString('en-IN', {month:'short', year:'numeric'});
}

function monthYM(date) { return date.slice(0,7); }

function daysInMonth(ym) {
  const [y, m] = ym.split('-').map(Number);
  return new Date(y, m, 0).getDate();
}

function todayYM() {
  const t = new Date();
  return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}`;
}

function availableMonths() {
  const set = new Set(DATA.map(r => monthYM(r.date)));
  const ym = Array.from(set).sort().reverse();
  if (!ym.length) ym.push(todayYM());
  return ym;
}

/* ─── colour palette for categories (fixed) ─── */
const CAT_COLORS = {
  travel:'#4af0a0', food:'#4abaff', groceries:'#b48aff',
  clothes:'#f0b44a', rent:'#f05a6a', bills:'#ff9248',
  luxuries:'#ff5fa8', investments:'#48d8ff', health:'#a8ff78',
  education:'#ffd166', other:'#888eaa', income:'#4abaff'
};
function catColor(cat) { return CAT_COLORS[cat] || '#888eaa'; }

/* ═══════════════════════════════════════════════════════════════
   DATA HELPERS
   ═══════════════════════════════════════════════════════════════ */
function forMonth(ym) { return DATA.filter(r => monthYM(r.date) === ym); }
function expenses(rows) { return rows.filter(r => r.type === 'expense'); }
function incomes(rows)  { return rows.filter(r => r.type === 'income'); }
function sum(rows)      { return rows.reduce((a,r) => a + r.amount, 0); }

function catTotals(rows) {
  const t = {};
  expenses(rows).forEach(r => { t[r.category] = (t[r.category]||0) + r.amount; });
  return Object.entries(t).sort((a,b) => b[1]-a[1]);
}

function dailyRunning(rows, ym) {
  const days = daysInMonth(ym);
  const byDay = {};
  expenses(rows).forEach(r => {
    const d = parseInt(r.date.slice(8));
    byDay[d] = (byDay[d]||0) + r.amount;
  });
  let cum = 0;
  const pts = [];
  for (let d = 1; d <= days; d++) {
    cum += byDay[d]||0;
    pts.push(cum);
  }
  return pts;
}

function last6MonthTotals() {
  const ms = availableMonths().slice(0,6).reverse();
  return ms.map(ym => ({ ym, total: sum(expenses(forMonth(ym))) }));
}

/* ═══════════════════════════════════════════════════════════════
   SVG HELPERS
   ═══════════════════════════════════════════════════════════════ */
function svgEl(tag, attrs={}, children=[]) {
  const ns = 'http://www.w3.org/2000/svg';
  const el = document.createElementNS(ns, tag);
  for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, v);
  children.forEach(c => typeof c === 'string'
    ? el.appendChild(document.createTextNode(c))
    : el.appendChild(c));
  return el;
}

/* ─── donut ─── */
function buildDonut(cats, total) {
  const R = 56, CX = 70, CY = 70, STROKE = 16;
  const svg = svgEl('svg',{viewBox:`0 0 ${CX*2} ${CY*2}`,class:'chart',style:'width:140px;height:140px;flex-shrink:0'});
  if (!total) {
    svg.appendChild(svgEl('circle',{cx:CX,cy:CY,r:R,fill:'none',stroke:'var(--border2)','stroke-width':STROKE}));
    return svg;
  }
  let angle = -Math.PI/2;
  cats.forEach(([cat, amt]) => {
    const frac = amt/total;
    const sweep = frac * 2 * Math.PI;
    const x1 = CX + R*Math.cos(angle), y1 = CY + R*Math.sin(angle);
    const x2 = CX + R*Math.cos(angle+sweep), y2 = CY + R*Math.sin(angle+sweep);
    const large = sweep > Math.PI ? 1 : 0;
    const d = `M ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2}`;
    svg.appendChild(svgEl('path',{d,fill:'none',stroke:catColor(cat),'stroke-width':STROKE,'stroke-linecap':'butt'}));
    angle += sweep;
  });
  // centre label
  svg.appendChild(svgEl('text',{x:CX,y:CY-6,'text-anchor':'middle','font-family':'Courier New','font-size':'10','fill':'var(--muted)'},'SPENT'));
  svg.appendChild(svgEl('text',{x:CX,y:CY+10,'text-anchor':'middle','font-family':'Courier New','font-size':'11','font-weight':'700','fill':'var(--accent)'},fmtMoney(total)));
  return svg;
}

/* ─── daily burn line chart ─── */
function buildBurnChart(ym, budget) {
  const W=560, H=130, ML=48, MR=12, MT=8, MB=28;
  const iW=W-ML-MR, iH=H-MT-MB;
  const pts  = dailyRunning(forMonth(ym), ym);
  const days = daysInMonth(ym);
  const maxV = Math.max(budget||1, ...pts, 100);
  const x = i => ML + (i/(days-1))*iW;
  const y = v => MT + iH - (v/maxV)*iH;
  const svg = svgEl('svg',{viewBox:`0 0 ${W} ${H}`,class:'chart'});

  // grid lines
  [0.25,0.5,0.75,1].forEach(f => {
    const yy = y(maxV*f);
    svg.appendChild(svgEl('line',{x1:ML,y1:yy,x2:W-MR,y2:yy,class:'grid-line'}));
    svg.appendChild(svgEl('text',{x:ML-4,y:yy+3,'text-anchor':'end',class:'axis-label'},fmtMoney(maxV*f)));
  });

  // budget pace line
  if (budget) {
    const bPts = pts.map((_,i) => `${x(i)},${y(budget*(i+1)/days)}`).join(' ');
    svg.appendChild(svgEl('polyline',{points:bPts,class:'chart-line-muted'}));
  }

  // spend area + line
  const ptStr = pts.map((v,i) => `${x(i)},${y(v)}`).join(' ');
  const areaD = `M ${x(0)},${y(0)} ` + pts.map((v,i)=>`L ${x(i)},${y(v)}`).join(' ')
    + ` L ${x(pts.length-1)},${y(0)} Z`;
  svg.appendChild(svgEl('path',{d:areaD,fill:catColor('travel'),class:'chart-area'}));
  svg.appendChild(svgEl('polyline',{points:ptStr,class:'chart-line'}));

  // x-axis labels
  const step = days <= 15 ? 2 : 5;
  for (let d=0; d<days; d+=step) {
    svg.appendChild(svgEl('text',{x:x(d),y:H-5,'text-anchor':'middle',class:'axis-label'},String(d+1)));
  }
  return svg;
}

/* ─── month-over-month bar chart ─── */
function buildMoMChart(data6) {
  const W=560, H=120, ML=52, MR=12, MT=8, MB=28;
  const iW=W-ML-MR, iH=H-MT-MB;
  const maxV = Math.max(...data6.map(d=>d.total), 1);
  const n = data6.length;
  const gap=6, bw=(iW - gap*(n-1))/n;
  const svg = svgEl('svg',{viewBox:`0 0 ${W} ${H}`,class:'chart'});

  [0,0.5,1].forEach(f => {
    const yy = MT + iH*(1-f);
    svg.appendChild(svgEl('line',{x1:ML,y1:yy,x2:W-MR,y2:yy,class:'grid-line'}));
    svg.appendChild(svgEl('text',{x:ML-4,y:yy+3,'text-anchor':'end',class:'axis-label'},fmtMoney(maxV*f)));
  });

  data6.forEach(({ym,total},i) => {
    const bx = ML + i*(bw+gap);
    const bh = (total/maxV)*iH;
    const by = MT + iH - bh;
    const isLatest = i===data6.length-1;
    svg.appendChild(svgEl('rect',{x:bx,y:by,width:bw,height:bh||1,
      fill: isLatest ? 'var(--accent)' : 'var(--border2)', rx:2}));
    svg.appendChild(svgEl('text',{x:bx+bw/2,y:H-5,'text-anchor':'middle',class:'axis-label'},
      ym.slice(5)+'/'+ym.slice(2,4)));
    if (total > 0) {
      svg.appendChild(svgEl('text',{x:bx+bw/2,y:by-4,'text-anchor':'middle',
        class:'axis-label',fill: isLatest ? 'var(--accent)':'var(--muted)'},fmtMoney(total)));
    }
  });
  return svg;
}

/* ═══════════════════════════════════════════════════════════════
   INSIGHTS ENGINE
   ═══════════════════════════════════════════════════════════════ */
function buildInsights(ym, monthRows, budget, budgets) {
  const exp = expenses(monthRows);
  const total = sum(exp);
  const today = new Date();
  const currentYM = todayYM();
  const days = daysInMonth(ym);
  const isCurrentMonth = ym === currentYM;
  const daysPassed = isCurrentMonth ? today.getDate() : days;
  const insights = [];

  // 1. biggest category
  const cats = catTotals(monthRows);
  if (cats.length) {
    const [topCat, topAmt] = cats[0];
    const saving20 = topAmt * 0.2 * 12;
    insights.push({
      icon:'▲',
      text: `Biggest spend: <strong>${topCat}</strong> at <em>${fmtMoney(topAmt)}</em>. `
          + `Cutting it 20% saves <em>${fmtMoney(saving20)}</em>/yr.`
    });
  }

  // 2. discretionary load
  const disc = exp.filter(r => ['food','luxuries','clothes'].includes(r.category));
  const discTotal = sum(disc);
  if (discTotal && total) {
    const pct = Math.round(discTotal/total*100);
    insights.push({
      icon:'◈',
      text: `Discretionary (food + luxuries + clothes): <em>${fmtMoney(discTotal)}</em> = <strong>${pct}%</strong> of total spend.`
    });
  }

  // 3. food order frequency
  const foodOrders = monthRows.filter(r => r.type==='expense' && r.category==='food');
  if (foodOrders.length) {
    const freq = (foodOrders.length / daysPassed * 30).toFixed(1);
    const avgAmt = sum(foodOrders) / foodOrders.length;
    insights.push({
      icon:'⊙',
      text: `Food orders: <em>${foodOrders.length}</em> this month (${freq}/month pace). Avg per order: <em>${fmtMoney(avgAmt)}</em>.`
    });
  }

  // 4. categories over budget
  const over = Object.entries(budgets||{}).filter(([cat,cap]) => {
    const spent = sum(exp.filter(r => r.category===cat));
    return spent > cap;
  });
  if (over.length) {
    const names = over.map(([c]) => c).join(', ');
    insights.push({
      icon:'⚠',
      text: `Over budget in: <strong>${names}</strong>. Review these categories.`
    });
  } else if (Object.keys(budgets||{}).length) {
    insights.push({ icon:'✓', text: 'All categories within budget caps this month.' });
  }

  // 5. MoM change
  const prevYM = (() => {
    const [y,m] = ym.split('-').map(Number);
    return m===1 ? `${y-1}-12` : `${y}-${String(m-1).padStart(2,'0')}`;
  })();
  const prevTotal = sum(expenses(forMonth(prevYM)));
  if (prevTotal > 0) {
    const delta = total - prevTotal;
    const pct = Math.abs(Math.round(delta/prevTotal*100));
    const dir = delta >= 0 ? 'up' : 'down';
    insights.push({
      icon: delta >= 0 ? '↑' : '↓',
      text: `Month-on-month: spend is <strong>${dir} ${pct}%</strong> vs last month `
          + `(${fmtMoney(total)} vs ${fmtMoney(prevTotal)}).`
    });
  }

  // 6. pace to beat budget
  if (isCurrentMonth && budget && daysPassed > 0) {
    const pace = total / daysPassed * days;
    if (pace < budget) {
      const saving = budget - pace;
      insights.push({
        icon:'→',
        text: `At current pace, you'll end the month at <em>${fmtMoney(pace)}</em> — `
            + `<em>${fmtMoney(saving)}</em> under budget. 👍`
      });
    } else {
      insights.push({
        icon:'→',
        text: `At current pace, you'll end the month at <strong>${fmtMoney(pace)}</strong> — `
            + `<strong>${fmtMoney(pace-budget)}</strong> over budget.`
      });
    }
  }

  return insights;
}

/* ═══════════════════════════════════════════════════════════════
   RENDER ENGINE
   ═══════════════════════════════════════════════════════════════ */
function h(tag, cls, inner, attrs={}) {
  const el = document.createElement(tag);
  if (cls) el.className = cls;
  if (typeof inner === 'string') el.innerHTML = inner;
  else if (inner instanceof Node) el.appendChild(inner);
  for (const [k,v] of Object.entries(attrs)) el.setAttribute(k,v);
  return el;
}

function div(cls, inner) {
  const el = document.createElement('div');
  el.className = cls;
  if (typeof inner === 'string') el.innerHTML = inner;
  else if (inner instanceof Node) el.appendChild(inner);
  return el;
}

function buildKPI(label, value, sub='', cls='green') {
  const d = div('kpi');
  d.innerHTML = `<div class="kpi-label">${label}</div>
    <div class="kpi-value ${cls}">${value}</div>
    <div class="kpi-sub">${sub}</div>`;
  return d;
}

function buildBurnBar(spent, budget) {
  const pct = budget > 0 ? Math.min(spent/budget,1.5)*100 : 0;
  const color = pct > 100 ? 'var(--danger)' : pct > 80 ? 'var(--warn)' : 'var(--accent)';
  const d = div('burn-wrap');
  d.innerHTML = `
    <div class="burn-bg">
      <div class="burn-fill" style="width:${Math.min(pct,100)}%;background:${color}"></div>
    </div>
    <div class="burn-labels">
      <span>${Math.round(pct)}% of budget used</span>
      <span>${budget>0 ? fmtMoney(budget-spent)+' remaining':'no budget set'}</span>
    </div>`;
  return d;
}

function buildCatBudget(cats, budgets, monthRows) {
  const exp = expenses(monthRows);
  const wrap = div('');
  const all = Object.keys(budgets).length
    ? Object.keys(budgets)
    : cats.map(([c])=>c);
  all.forEach(cat => {
    const cap   = budgets[cat]||0;
    const spent = sum(exp.filter(r=>r.category===cat));
    if (!spent && !cap) return;
    const pct   = cap ? Math.min(spent/cap,1.5)*100 : 100;
    const over  = cap && spent > cap;
    const row = div('cat-row');
    const amtStr = cap
      ? `<span class="${over?'red':'green'}">${fmtMoney(spent)}</span><span class="muted">/${fmtMoney(cap)}</span>`
      : `<span class="green">${fmtMoney(spent)}</span>`;
    row.innerHTML = `
      <div class="cat-name" style="color:${catColor(cat)}">${cat}</div>
      <div class="cat-bar-bg">
        <div class="cat-bar-fill" style="width:${Math.min(pct,100)}%;background:${over?'var(--danger)':catColor(cat)}"></div>
      </div>
      <div class="cat-amt">${amtStr}</div>`;
    wrap.appendChild(row);
  });
  return wrap;
}

function buildRecentTable(rows, limit=12) {
  const sorted = [...rows].sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id).slice(0,limit);
  if (!sorted.length) return div('empty','<span class="empty-code">No entries yet.</span>');
  const tbl = document.createElement('table');
  tbl.className = 'txn-table';
  tbl.innerHTML = `<thead><tr><th>Date</th><th>Note</th><th>Category</th><th style="text-align:right">Amount</th></tr></thead>`;
  const tb = document.createElement('tbody');
  sorted.forEach(r => {
    const isInc = r.type==='income';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="color:var(--muted);white-space:nowrap">${r.date.slice(5)}</td>
      <td>${r.note||'—'}</td>
      <td><span class="cat-chip">${r.category}</span></td>
      <td style="text-align:right;font-weight:700" class="${isInc?'blue':'green'}">
        ${isInc?'+':'−'}${fmtMoney(r.amount)}</td>`;
    tb.appendChild(tr);
  });
  tbl.appendChild(tb);
  return tbl;
}

function buildInsightPanel(ym, monthRows, budget, budgets) {
  const items = buildInsights(ym, monthRows, budget, budgets);
  if (!items.length) return div('empty', 'Not enough data for insights yet.');
  const ul = document.createElement('ul');
  ul.className = 'insight-list';
  items.forEach(({icon,text}) => {
    const li = document.createElement('li');
    li.innerHTML = `<span class="insight-icon">${icon}</span><span class="insight-text">${text}</span>`;
    ul.appendChild(li);
  });
  return ul;
}

function render() {
  const sel = document.getElementById('month-select').value || todayYM();
  const monthRows = forMonth(sel);
  const exp       = expenses(monthRows);
  const inc       = incomes(monthRows);
  const totalExp  = sum(exp);
  const totalInc  = sum(inc);
  const budget    = CONFIG.monthlyBudget || 0;
  const budgets   = CONFIG.budgets || {};
  const cats      = catTotals(monthRows);
  const totalCats = sum(exp);

  // projected spend
  const today = new Date();
  const currentYM = todayYM();
  const days = daysInMonth(sel);
  const daysPassed = sel===currentYM ? today.getDate() : days;
  const projected = daysPassed>0 ? (totalExp/daysPassed)*days : totalExp;

  // savings
  const savings = totalInc - totalExp;

  const app = document.getElementById('app');
  app.innerHTML = '';

  // ─── sample data banner ───
  if (IS_SAMPLE) {
    const banner = div('c12 panel',
      `<div style="background:var(--border2);border-left:3px solid var(--warn);padding:10px 14px;font-size:0.78rem;color:var(--warn)">
      ⚠ Showing sample data. Run <code>python export.py</code> (or start the bot) to load your real transactions.
      </div>`);
    app.appendChild(banner);
  }

  // ─── KPI row ───
  const kpiRow = div('c12');
  kpiRow.style.cssText='display:grid;grid-template-columns:repeat(4,1fr);border-bottom:var(--cell)';
  const rem = budget - totalExp;
  const remText = budget ? `of ${fmtMoney(budget)} budget` : 'no budget set';
  kpiRow.appendChild(buildKPI('Spent This Month', fmtMoney(totalExp), remText, totalExp>budget?'red':'green'));
  kpiRow.appendChild(buildKPI('Income', fmtMoney(totalInc), `${inc.length} credit(s)`, 'blue'));
  kpiRow.appendChild(buildKPI('Savings', fmtMoney(savings), savings>=0?'net positive':'net negative', savings>=0?'green':'red'));
  kpiRow.appendChild(buildKPI('Projected Month-End', fmtMoney(projected),
    budget ? (projected>budget ? `${fmtMoney(projected-budget)} over budget`:`${fmtMoney(budget-projected)} under budget`) : '',
    projected>budget?'amber':'green'));
  app.appendChild(kpiRow);

  // ─── Burn bar row ───
  const burnRow = div('c12 panel');
  const plbl = div('panel-label','MONTHLY BURN');
  burnRow.appendChild(plbl);
  burnRow.appendChild(buildBurnBar(totalExp, budget));
  app.appendChild(burnRow);

  // ─── Donut + category table (left) | Category budgets (right) ───
  const donutPanel = div('c6 panel');
  donutPanel.appendChild(div('panel-label','WHERE THE MONEY GOES'));
  if (!cats.length) {
    donutPanel.appendChild(div('empty','<span class="empty-code">No expenses logged yet.</span>'));
  } else {
    const wrap = div('donut-wrap');
    wrap.appendChild(buildDonut(cats, totalCats));
    const legend = div('donut-legend');
    cats.forEach(([cat, amt]) => {
      const pct = totalCats ? Math.round(amt/totalCats*100) : 0;
      const row = div('legend-row');
      row.innerHTML = `
        <div class="legend-dot" style="background:${catColor(cat)}"></div>
        <div class="legend-name">${cat}</div>
        <div class="legend-pct">${pct}%</div>
        <div class="legend-amt">${fmtMoney(amt)}</div>`;
      legend.appendChild(row);
    });
    wrap.appendChild(legend);
    donutPanel.appendChild(wrap);
  }
  app.appendChild(donutPanel);

  const budgetPanel = div('c6 panel');
  budgetPanel.appendChild(div('panel-label','BUDGETS & ALERTS'));
  budgetPanel.appendChild(buildCatBudget(cats, budgets, monthRows));
  app.appendChild(budgetPanel);

  // ─── Daily burn chart ───
  const burnChartPanel = div('c8 panel');
  burnChartPanel.appendChild(div('panel-label','DAILY CUMULATIVE SPEND'));
  if (monthRows.length) {
    burnChartPanel.appendChild(buildBurnChart(sel, budget));
    const note = div('','');
    note.innerHTML = '<div style="font-size:0.68rem;color:var(--muted);margin-top:6px">━━ actual spend &nbsp;&nbsp; ╌╌ even-pace budget</div>';
    burnChartPanel.appendChild(note);
  } else {
    burnChartPanel.appendChild(div('empty','No data for this month.'));
  }
  app.appendChild(burnChartPanel);

  // ─── Spending insights ───
  const insightPanel = div('c4 panel');
  insightPanel.appendChild(div('panel-label','SPENDING INSIGHTS'));
  insightPanel.appendChild(buildInsightPanel(sel, monthRows, budget, budgets));
  app.appendChild(insightPanel);

  // ─── Month over month ───
  const momPanel = div('c12 panel');
  momPanel.appendChild(div('panel-label','MONTH OVER MONTH — LAST 6 MONTHS'));
  const mom6 = last6MonthTotals();
  if (mom6.length) {
    momPanel.appendChild(buildMoMChart(mom6));
  } else {
    momPanel.appendChild(div('empty','Not enough history yet.'));
  }
  app.appendChild(momPanel);

  // ─── Recent transactions ───
  const recentPanel = div('c12 panel');
  recentPanel.appendChild(div('panel-label','RECENT ACTIVITY'));
  recentPanel.appendChild(buildRecentTable(monthRows));
  app.appendChild(recentPanel);
}

/* ─── populate month selector + initial render ─── */
function init() {
  const sel = document.getElementById('month-select');
  const months = availableMonths();
  months.forEach(ym => {
    const opt = document.createElement('option');
    opt.value = ym;
    opt.textContent = fmtMonthLabel(ym);
    sel.appendChild(opt);
  });
  sel.value = months[0] || todayYM();

  const upd = document.getElementById('last-updated');
  const dot = document.getElementById('status-dot');
  if (IS_SAMPLE) {
    upd.textContent = '[ SAMPLE DATA ]';
    upd.style.color = 'var(--warn)';
    if (dot) dot.title = 'Could not load live data — showing sample data';
  } else {
    upd.textContent = `updated ${new Date().toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit'})}`;
    upd.style.color = 'var(--muted)';
    if (dot) dot.title = 'Data is live from the API';
  }

  render();
}

async function loadAndInit() {
  try {
    const res = await fetch(`${API_BASE}/api/data`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const payload = await res.json();
    DATA = payload.transactions || [];
    CONFIG = payload.config || SAMPLE_CONFIG;
    CUR = CONFIG.currency || '₹';
    IS_SAMPLE = false;
  } catch (err) {
    console.error('Failed to load /api/data, falling back to sample data:', err);
    DATA = SAMPLE_DATA;
    CONFIG = SAMPLE_CONFIG;
    CUR = CONFIG.currency || '₹';
    IS_SAMPLE = true;
  }
  init();
}

loadAndInit();
</script>
